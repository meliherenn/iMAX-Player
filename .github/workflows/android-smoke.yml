name: Android Smoke (ABI matrix)

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  android-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - api-level: 29
            arch: x86
            abi: x86
          - api-level: 34
            arch: x86_64
            abi: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug + androidTest APK
        run: ./gradlew :app:assembleDebug :app:assembleDebugAndroidTest

      - name: Emulator install + launch + smoke test (API ${{ matrix.api-level }} / ${{ matrix.arch }})
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.arch }}
          profile: pixel_3a
          disable-animations: true
          script: |
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb shell am start -W -n com.imax.player.debug/com.imax.player.MainActivity
            adb shell pidof com.imax.player.debug
            ./gradlew :app:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.imax.player.smoke.AppLaunchSmokeTest
